<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BĐS Luxury – Bất Động Sản Cao Cấp</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dark: #8a6a1f;
  --navy: #0d1b2a;
  --navy-mid: #162235;
  --navy-light: #1e3050;
  --navy-accent: #1a2e48;
  --white: #f5f0e8;
  --white-dim: rgba(245,240,232,0.7);
  --card-bg: #111e2e;
  --overlay: rgba(13,27,42,0.92);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--navy);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* NOISE TEXTURE */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(13,27,42,0.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,0.2);padding:0 32px}
.header-inner{max-width:1400px;margin:0 auto;height:72px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;letter-spacing:0.08em;color:var(--gold);text-decoration:none;display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:1rem}
.header-contact{display:flex;align-items:center;gap:8px}
.contact-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .25s;text-decoration:none;font-size:1.1rem;border:1px solid transparent}
.contact-icon:hover{transform:translateY(-2px);border-color:var(--gold)}
.ci-zalo{background:#0068ff;color:#fff}
.ci-whatsapp{background:#25d366;color:#fff}
.ci-viber{background:#7360f2;color:#fff}
.ci-line{background:#00c300;color:#fff}
.ci-kakao{background:#fee500;color:#000}
.ci-facebook{background:#1877f2;color:#fff}

/* HERO */
.hero{position:relative;padding:80px 32px 60px;text-align:center;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%)}
.hero-tag{display:inline-block;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,168,76,0.3);padding:5px 16px;margin-bottom:20px}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.4rem,5vw,4rem);font-weight:300;line-height:1.15;color:var(--white);margin-bottom:12px}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero-sub{color:var(--white-dim);font-size:.95rem;font-weight:300;max-width:500px;margin:0 auto}

/* FILTER BAR */
.filter-bar{padding:24px 32px;max-width:1400px;margin:0 auto}
.filter-inner{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filter-tags{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.tag-btn{padding:7px 18px;border-radius:100px;font-size:.82rem;font-weight:400;letter-spacing:.04em;cursor:pointer;transition:all .2s;border:1px solid rgba(201,168,76,0.25);background:transparent;color:var(--white-dim)}
.tag-btn:hover,.tag-btn.active{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:500}
.search-wrap{position:relative}
.search-input{background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.2);border-radius:100px;padding:8px 16px 8px 40px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.88rem;width:220px;outline:none;transition:all .2s}
.search-input::placeholder{color:rgba(245,240,232,0.35)}
.search-input:focus{border-color:var(--gold);background:rgba(201,168,76,0.05);width:260px}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:.85rem}

/* SORT + COUNT */
.list-meta{max-width:1400px;margin:0 auto;padding:0 32px 20px;display:flex;align-items:center;justify-content:space-between}
.count-label{font-size:.82rem;color:var(--white-dim)}
.count-label span{color:var(--gold);font-weight:500}
.sort-select{background:transparent;border:1px solid rgba(201,168,76,0.2);color:var(--white);padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:.82rem;border-radius:6px;cursor:pointer;outline:none}
.sort-select option{background:var(--navy-mid)}

/* GRID */
.grid-wrap{max-width:1400px;margin:0 auto;padding:0 32px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}

/* CARD */
.card{background:var(--card-bg);border:1px solid rgba(201,168,76,0.12);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .3s;position:relative}
.card:hover{transform:translateY(-6px);border-color:rgba(201,168,76,0.4);box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(201,168,76,0.15)}
.card-img{width:100%;height:200px;object-fit:cover;display:block;transition:transform .4s}
.card:hover .card-img{transform:scale(1.04)}
.card-img-wrap{overflow:hidden;position:relative}
.card-badge{position:absolute;top:12px;left:12px;background:var(--gold);color:var(--navy);font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:4px}
.card-body{padding:16px 18px 18px}
.card-price{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;color:var(--gold);margin-bottom:6px}
.card-name{font-size:.92rem;font-weight:400;color:var(--white);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;gap:12px;font-size:.78rem;color:var(--white-dim);margin-bottom:10px}
.card-meta span{display:flex;align-items:center;gap:4px}
.card-tags{display:flex;gap:6px;flex-wrap:wrap}
.card-tag{font-size:.7rem;padding:2px 8px;border:1px solid rgba(201,168,76,0.2);color:rgba(201,168,76,0.7);border-radius:4px}
.card-desc{font-size:.8rem;color:var(--white-dim);margin-top:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}

/* PAGINATION */
.pagination{max-width:1400px;margin:48px auto 0;padding:0 32px 80px;display:flex;justify-content:center;align-items:center;gap:8px}
.page-btn{width:40px;height:40px;border-radius:8px;border:1px solid rgba(201,168,76,0.2);background:transparent;color:var(--white-dim);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.88rem;transition:all .2s;display:flex;align-items:center;justify-content:center}
.page-btn:hover,.page-btn.active{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:600}
.page-btn.disabled{opacity:.3;pointer-events:none}
.page-ellipsis{color:var(--white-dim);padding:0 4px}

/* MODAL OVERLAY */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.modal-overlay.open{display:flex}
.modal{background:var(--navy-mid);border:1px solid rgba(201,168,76,0.2);border-radius:16px;max-width:820px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:modalIn .3s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
.modal-close{position:absolute;top:16px;right:16px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);color:var(--gold);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.1rem;z-index:10;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:var(--gold);color:var(--navy)}
.modal-gallery{display:grid;grid-template-columns:1fr 1fr;gap:3px;max-height:340px;overflow:hidden;border-radius:12px 12px 0 0}
.modal-gallery img{width:100%;height:170px;object-fit:cover;cursor:pointer;transition:opacity .2s}
.modal-gallery img:first-child{grid-column:span 2;height:220px}
.modal-gallery img:hover{opacity:.85}
.modal-content{padding:28px 32px 32px}
.modal-header{margin-bottom:20px}
.modal-badge{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-weight:500}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:500;color:var(--white);line-height:1.2;margin-bottom:8px}
.modal-price{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--gold);font-weight:600}
.modal-divider{height:1px;background:linear-gradient(90deg,rgba(201,168,76,0.4),transparent);margin:20px 0}
.modal-specs{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.spec-item{background:rgba(255,255,255,0.03);border:1px solid rgba(201,168,76,0.1);border-radius:8px;padding:12px 14px;text-align:center}
.spec-val{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--gold);font-weight:500}
.spec-label{font-size:.7rem;color:var(--white-dim);margin-top:3px;letter-spacing:.04em}
.modal-desc-title{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;font-weight:500}
.modal-desc{font-size:.9rem;line-height:1.75;color:var(--white-dim);margin-bottom:24px;white-space:pre-wrap}
.modal-contact-title{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;font-weight:500}
.modal-contact-btns{display:flex;gap:10px;flex-wrap:wrap}
.contact-btn{display:flex;align-items:center;gap:8px;padding:11px 20px;border-radius:50px;font-size:.85rem;font-weight:500;text-decoration:none;transition:all .25s;border:1px solid transparent}
.contact-btn:hover{transform:translateY(-2px);filter:brightness(1.1)}
.btn-zalo{background:#0068ff;color:#fff}
.btn-whatsapp{background:#25d366;color:#fff}
.btn-viber{background:#7360f2;color:#fff}
.btn-line{background:#00c300;color:#fff}
.btn-kakao{background:#fee500;color:#000}
.btn-facebook{background:#1877f2;color:#fff}
.btn-icon{font-size:1rem}

/* EMPTY */
.empty-state{text-align:center;padding:80px 32px;color:var(--white-dim)}
.empty-state .empty-icon{font-size:3rem;margin-bottom:16px;opacity:.4}
.empty-state p{font-size:1rem}

/* FOOTER */
footer{border-top:1px solid rgba(201,168,76,0.1);padding:32px;text-align:center}
.footer-inner{max-width:1400px;margin:0 auto}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--gold);margin-bottom:8px}
.footer-text{font-size:.78rem;color:var(--white-dim)}
.footer-contact{display:flex;justify-content:center;gap:10px;margin:16px 0}

/* SCROLL CUSTOM */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--navy)}
::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px}

/* RESPONSIVE */
@media(max-width:768px){
  .header-inner{padding:0}
  header{padding:0 16px}
  .hero{padding:48px 16px 40px}
  .filter-bar,.list-meta,.grid-wrap{padding-left:16px;padding-right:16px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
  .modal-gallery{grid-template-columns:1fr}
  .modal-gallery img:first-child{grid-column:span 1}
  .modal-content{padding:20px}
  .modal-specs{grid-template-columns:repeat(2,1fr)}
  .modal-title{font-size:1.5rem}
  .contact-icon{width:32px;height:32px;font-size:.95rem}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <a href="#" class="logo">
      <div class="logo-icon">🏛</div>
      BĐS LUXURY
    </a>
    <div class="header-contact" id="headerContact"></div>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-tag">Bất Động Sản Cao Cấp</div>
  <h1>Tìm Ngôi Nhà<br><em>Hoàn Hảo</em> Của Bạn</h1>
  <p class="hero-sub">Danh sách bất động sản uy tín – cho thuê & bán – được cập nhật thường xuyên</p>
</section>

<!-- FILTER -->
<div class="filter-bar">
  <div class="filter-inner">
    <div class="filter-tags" id="filterTags">
      <button class="tag-btn active" onclick="setTag('all', this)">Tất cả</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Tìm kiếm..." oninput="renderGrid()">
    </div>
  </div>
</div>

<!-- META -->
<div class="list-meta">
  <div class="count-label">Hiển thị <span id="countShown">0</span> / <span id="countTotal">0</span> bất động sản</div>
  <select class="sort-select" id="sortSelect" onchange="renderGrid()">
    <option value="newest">Mới nhất</option>
    <option value="price_asc">Giá tăng dần</option>
    <option value="price_desc">Giá giảm dần</option>
  </select>
</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="grid" id="propertyGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">🏘</div>
    <p>Không tìm thấy bất động sản phù hợp</p>
  </div>
</div>

<!-- PAGINATION -->
<div class="pagination" id="pagination"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div class="footer-logo">🏛 BĐS Luxury</div>
    <div class="footer-contact" id="footerContact"></div>
    <div class="footer-text">© 2025 BĐS Luxury – Mọi quyền được bảo lưu</div>
  </div>
</footer>

<script>
// ─────────────────────────────────────
// CONFIG – thay đổi thông tin liên hệ
// ─────────────────────────────────────
const CONFIG = {
  contacts: [
    { type:'zalo',     label:'Zalo',      icon:'💬', color:'#0068ff', url:'https://zalo.me/0909000000' },
    { type:'whatsapp', label:'WhatsApp',  icon:'📱', color:'#25d366', url:'https://wa.me/84909000000' },
    { type:'viber',    label:'Viber',     icon:'📞', color:'#7360f2', url:'viber://chat?number=+84909000000' },
    { type:'line',     label:'LINE',      icon:'💚', color:'#00c300', url:'https://line.me/ti/p/YOUR_ID' },
    { type:'kakao',    label:'KakaoTalk', icon:'🟡', color:'#fee500', textColor:'#000', url:'https://open.kakao.com/o/YOUR_ID' },
    { type:'facebook', label:'Facebook',  icon:'🔵', color:'#1877f2', url:'https://m.me/YOUR_PAGE' },
  ],
  perPage: 12
};

const ITEMS_PER_PAGE = CONFIG.perPage;
let currentPage = 1;
let activeTag = 'all';
let allData = [];

// ─────────────────────────────────────
// LOAD DATA
// ─────────────────────────────────────
function loadData() {
  try { allData = JSON.parse(localStorage.getItem('bds_properties') || '[]'); }
  catch(e) { allData = []; }
  buildTags();
  renderGrid();
}

function buildTags() {
  const tagSet = new Set();
  allData.forEach(p => (p.tags||[]).forEach(t => tagSet.add(t)));
  const wrap = document.getElementById('filterTags');
  wrap.innerHTML = '<button class="tag-btn active" onclick="setTag(\'all\',this)">Tất cả</button>';
  tagSet.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.textContent = t;
    btn.onclick = function(){ setTag(t, this); };
    wrap.appendChild(btn);
  });
}

function setTag(tag, el) {
  activeTag = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentPage = 1;
  renderGrid();
}

// ─────────────────────────────────────
// FILTER + SORT + PAGINATE
// ─────────────────────────────────────
function getFiltered() {
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase().trim();
  const sort = document.getElementById('sortSelect')?.value||'newest';
  let list = [...allData];
  if (activeTag !== 'all') list = list.filter(p => (p.tags||[]).includes(activeTag));
  if (q) list = list.filter(p =>
    (p.name||'').toLowerCase().includes(q) ||
    (p.desc||'').toLowerCase().includes(q) ||
    (p.tags||[]).some(t => t.toLowerCase().includes(q))
  );
  if (sort === 'price_asc') list.sort((a,b) => parsePriceNum(a.price) - parsePriceNum(b.price));
  else if (sort === 'price_desc') list.sort((a,b) => parsePriceNum(b.price) - parsePriceNum(a.price));
  else list.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
  return list;
}

function parsePriceNum(str) {
  if (!str) return 0;
  return parseFloat(str.replace(/[^0-9.]/g,''))||0;
}

function renderGrid() {
  const filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.ceil(total / ITEMS_PER_PAGE);
  if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

  document.getElementById('countTotal').textContent = total;
  document.getElementById('countShown').textContent = pageItems.length;

  const grid = document.getElementById('propertyGrid');
  const empty = document.getElementById('emptyState');
  if (!pageItems.length) {
    grid.innerHTML = ''; empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    grid.innerHTML = pageItems.map(p => cardHTML(p)).join('');
  }
  renderPagination(totalPages);
}

function cardHTML(p) {
  const img = (p.images && p.images[0]) ? `<img class="card-img" src="${p.images[0]}" alt="${p.name}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'400\\' height=\\'200\\'><rect fill=\\' %230d1b2a\\' width=\\'400\\' height=\\'200\\'/>'+encodeURIComponent('<text x=\\'50%\\' y=\\'50%\\' fill=\\'%23c9a84c\\' text-anchor=\\'middle\\' font-size=\\'40\\'>🏠</text>')+'</svg>'">` : `<div class="card-img" style="display:flex;align-items:center;justify-content:center;background:#162235;font-size:3rem">🏠</div>`;
  const tags = (p.tags||[]).slice(0,3).map(t=>`<span class="card-tag">${t}</span>`).join('');
  const badge = p.badge ? `<span class="card-badge">${p.badge}</span>` : '';
  return `<div class="card" onclick="openModal('${p.id}')">
    <div class="card-img-wrap">${img}${badge}</div>
    <div class="card-body">
      <div class="card-price">${p.price||'Liên hệ'}</div>
      <div class="card-name">${p.name||'Bất động sản'}</div>
      <div class="card-meta">
        ${p.area?`<span>📐 ${p.area}</span>`:''}
        ${p.location?`<span>📍 ${p.location}</span>`:''}
      </div>
      <div class="card-tags">${tags}</div>
      ${p.desc?`<div class="card-desc">${p.desc}</div>`:''}
    </div>
  </div>`;
}

// ─────────────────────────────────────
// PAGINATION
// ─────────────────────────────────────
function renderPagination(totalPages) {
  const wrap = document.getElementById('pagination');
  if (totalPages <= 1) { wrap.innerHTML = ''; return; }
  let html = '';
  html += `<button class="page-btn${currentPage===1?' disabled':''}" onclick="goPage(${currentPage-1})">‹</button>`;
  const pages = getPageRange(currentPage, totalPages);
  pages.forEach(p => {
    if (p === '...') html += `<span class="page-ellipsis">…</span>`;
    else html += `<button class="page-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  html += `<button class="page-btn${currentPage===totalPages?' disabled':''}" onclick="goPage(${currentPage+1})">›</button>`;
  wrap.innerHTML = html;
}

function getPageRange(cur, total) {
  if (total <= 7) return Array.from({length:total},(_,i)=>i+1);
  const r = [];
  r.push(1);
  if (cur > 3) r.push('...');
  for (let i=Math.max(2,cur-1); i<=Math.min(total-1,cur+1); i++) r.push(i);
  if (cur < total-2) r.push('...');
  r.push(total);
  return r;
}

function goPage(p) {
  const filtered = getFiltered();
  const max = Math.ceil(filtered.length / ITEMS_PER_PAGE);
  if (p < 1 || p > max) return;
  currentPage = p;
  renderGrid();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ─────────────────────────────────────
// MODAL
// ─────────────────────────────────────
function openModal(id) {
  const p = allData.find(x => x.id === id);
  if (!p) return;
  const gallery = (p.images||[]).slice(0,4);
  const galleryHTML = gallery.length
    ? gallery.map((img,i) => `<img src="${img}" alt="Ảnh ${i+1}" onerror="this.style.display='none'" loading="lazy">`).join('')
    : `<div style="height:220px;background:#162235;display:flex;align-items:center;justify-content:center;font-size:4rem;grid-column:span 2">🏠</div>`;

  const contactBtns = CONFIG.contacts.map(c =>
    `<a class="contact-btn btn-${c.type}" href="${c.url}" target="_blank" rel="noopener">
      <span class="btn-icon">${c.icon}</span>${c.label}
    </a>`
  ).join('');

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-gallery">${galleryHTML}</div>
    <div class="modal-content">
      <div class="modal-header">
        ${p.badge?`<div class="modal-badge">${p.badge}</div>`:''}
        <div class="modal-title">${p.name||'Bất động sản'}</div>
        <div class="modal-price">${p.price||'Liên hệ'}</div>
      </div>
      ${(p.area||p.location||p.rooms)?`
      <div class="modal-specs">
        ${p.area?`<div class="spec-item"><div class="spec-val">${p.area}</div><div class="spec-label">Diện tích</div></div>`:''}
        ${p.location?`<div class="spec-item"><div class="spec-val">${p.location}</div><div class="spec-label">Khu vực</div></div>`:''}
        ${p.rooms?`<div class="spec-item"><div class="spec-val">${p.rooms}</div><div class="spec-label">Phòng ngủ</div></div>`:''}
      </div>`:''}
      <div class="modal-divider"></div>
      ${p.desc?`<div class="modal-desc-title">Mô tả</div><div class="modal-desc">${p.desc}</div>`:''}
      <div class="modal-contact-title">Liên hệ ngay</div>
      <div class="modal-contact-btns">${contactBtns}</div>
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay') && e.type !== 'click') return;
  if (e && e.currentTarget !== document.getElementById('modalOverlay') && e.target.closest('.modal') && e.target !== document.querySelector('.modal-close')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ─────────────────────────────────────
// CONTACT ICONS
// ─────────────────────────────────────
function buildContacts() {
  ['headerContact','footerContact'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = CONFIG.contacts.map(c =>
      `<a class="contact-icon ci-${c.type}" href="${c.url}" target="_blank" rel="noopener" title="${c.label}">${c.icon}</a>`
    ).join('');
  });
}

// ─────────────────────────────────────
// INIT
// ─────────────────────────────────────
buildContacts();
loadData();
